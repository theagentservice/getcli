name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  npm-package-check:
    name: npm — Package Smoke Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-npm-package.mjs

  cli-check:
    name: CLI — Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - run: cargo check
      - run: cargo test
      - run: cargo clippy -- -D warnings

  cli-build:
    name: CLI — Build (${{ matrix.target }})
    needs:
      - npm-package-check
      - cli-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BIN_NAME="getcli"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_NAME="getcli.exe"
          fi
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$BIN_NAME dist/
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../getcli-${{ matrix.target }}.zip $BIN_NAME
          else
            tar czf ../getcli-${{ matrix.target }}.tar.gz $BIN_NAME
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: getcli-${{ matrix.target }}
          path: cli/getcli-${{ matrix.target }}.*

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
