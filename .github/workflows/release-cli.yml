name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: getcli-x86_64-apple-darwin.tar.gz
            npm_pkg: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: getcli-aarch64-apple-darwin.tar.gz
            npm_pkg: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: getcli-x86_64-unknown-linux-gnu.tar.gz
            npm_pkg: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: getcli-aarch64-unknown-linux-gnu.tar.gz
            npm_pkg: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: getcli-x86_64-pc-windows-msvc.zip
            npm_pkg: win32-x64
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Copy manifests
        shell: bash
        run: cp ../manifests/*.yaml manifests/

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary for GitHub Release
        shell: bash
        run: |
          BIN_NAME="getcli"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_NAME="getcli.exe"
          fi
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$BIN_NAME dist/
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../${{ matrix.asset }} $BIN_NAME
          else
            tar czf ../${{ matrix.asset }} $BIN_NAME
          fi

      - name: Prepare npm platform package
        shell: bash
        run: |
          BIN_NAME="getcli"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_NAME="getcli.exe"
          fi
          NPM_DIR="../npm/${{ matrix.npm_pkg }}"
          mkdir -p "$NPM_DIR/bin"
          cp target/${{ matrix.target }}/release/$BIN_NAME "$NPM_DIR/bin/"

      - uses: actions/upload-artifact@v4
        with:
          name: getcli-${{ matrix.target }}
          path: cli/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: getcli-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate with crates.io trusted publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Copy manifests into cli
        run: cp manifests/*.yaml cli/manifests/
      - name: Publish
        working-directory: cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Use npmjs registry explicitly
        run: npm config set registry https://registry.npmjs.org

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts
          pattern: npm-*

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish platform packages
        run: |
          for pkg_dir in npm-artifacts/npm-*; do
            PKG_NAME=$(basename "$pkg_dir" | sed 's/^npm-//')
            # Copy artifact contents into the source npm package dir
            cp -r "$pkg_dir"/* "npm/$PKG_NAME/"
            cd "npm/$PKG_NAME"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --provenance --access public --registry=https://registry.npmjs.org
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish main getcli package
        run: |
          node scripts/check-npm-package.mjs
          cd npm/getcli
          # Update optionalDependencies versions
          node -e "
            const pkg = require('./package.json');
            const v = process.env.VERSION;
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = v;
            }
            pkg.version = v;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --provenance --access public --registry=https://registry.npmjs.org

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap repo
        uses: actions/checkout@v4
        with:
          repository: theagentservice/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download release assets and compute sha256
        run: |
          BASE_URL="https://github.com/theagentservice/getcli/releases/download/${GITHUB_REF_NAME}"
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            FILE="getcli-${target}.tar.gz"
            curl -fsSL -o "$FILE" "${BASE_URL}/${FILE}"
            SHA=$(sha256sum "$FILE" | awk '{print $1}')
            VAR_NAME="SHA_$(echo "$target" | tr '[:lower:]-' '[:upper:]_')"
            echo "${VAR_NAME}=$SHA" >> $GITHUB_ENV
          done

      - name: Generate formula
        run: |
          mkdir -p Formula
          cat > Formula/getcli.rb << EOF
          class Getcli < Formula
            desc "A unified installer for agent-friendly CLIs"
            homepage "https://getcli.dev"
            license "Apache-2.0"
            version "$VERSION"

            on_macos do
              on_arm do
                url "https://github.com/theagentservice/getcli/releases/download/v$VERSION/getcli-aarch64-apple-darwin.tar.gz"
                sha256 "$SHA_AARCH64_APPLE_DARWIN"
              end
              on_intel do
                url "https://github.com/theagentservice/getcli/releases/download/v$VERSION/getcli-x86_64-apple-darwin.tar.gz"
                sha256 "$SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/theagentservice/getcli/releases/download/v$VERSION/getcli-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_AARCH64_UNKNOWN_LINUX_GNU"
              end
              on_intel do
                url "https://github.com/theagentservice/getcli/releases/download/v$VERSION/getcli-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "getcli"
            end

            test do
              assert_match "getcli", shell_output("#{bin}/getcli --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/getcli.rb
          git diff --cached --quiet || git commit -m "getcli $VERSION"
          git push
